<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="48" fill="white" stroke="black" stroke-width="2"/>
  <path d="M50 2 A48 48 0 0 0 50 98 Z" fill="black"/>
  <!-- Stylized 'A' that flips color based on background -->
  <g stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left side of A (White on Black) -->
    <clipPath id="leftHalf">
      <rect x="0" y="0" width="50" height="100" />
    </clipPath>
    <path d="M35 75 L50 25 L65 75 M42 60 L58 60" fill="none" stroke="white" clip-path="url(#leftHalf)" />
    
    <!-- Right side of A (Black on White) -->
    <clipPath id="rightHalf">
      <rect x="50" y="0" width="50" height="100" />
    </clipPath>
    <path d="M35 75 L50 25 L65 75 M42 60 L58 60" fill="none" stroke="black" clip-path="url(#rightHalf)" />
  </g>
</svg>